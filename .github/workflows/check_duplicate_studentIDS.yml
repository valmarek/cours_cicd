name: Check duplicate student IDs

on:
  push:
    branches:
      - main
  #pull_request:
    #branches:
      #- main

jobs:
  check-for-duplicate-student-ids:
    name: Check for Duplicate Student IDs
    runs-on: ubuntu-latest

    env:
      PGDATABASE: ${{ secrets.DB_NAME }}
      PGUSER: ${{ secrets.DB_USER }}
      PGPASSWORD: ${{ secrets.DB_PASSWORD }}
      PGHOST: ${{ secrets.DB_HOST }}
      PGPORT: ${{ secrets.DB_PORT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest psycopg2-binary

      - name: Create table and generate data
        run: |
          python generate_students_data.py
      
      - name: Run duplicate check test
        run: |
          pytest -v test_no_duplicate_student_ids.py
